<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>위고비 vs 마운자로 — 체크리스트로 알아보기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f4f6f3;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem 4rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem 1.75rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e6f4ee;
    color: #1d7a54;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 1.25rem;
    letter-spacing: 0.02em;
  }
  .quiz-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.5rem;
    color: #111;
  }
  .quiz-sub {
    font-size: 14px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 1.75rem;
  }
  .progress-wrap {
    background: #eee;
    border-radius: 99px;
    height: 5px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 5px;
    background: #1d9e75;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .step-label {
    font-size: 12px;
    color: #999;
    margin-bottom: 0.6rem;
  }
  .q-text {
    font-size: 17px;
    font-weight: 600;
    color: #111;
    line-height: 1.5;
    margin-bottom: 0.35rem;
  }
  .q-desc {
    font-size: 13px;
    color: #888;
    margin-bottom: 1.1rem;
  }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    background: #fafafa;
    border: 1.5px solid #e4e4e4;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .opt-btn:hover { border-color: #1d9e75; background: #f0faf6; }
  .opt-btn.sel { border-color: #1d9e75; background: #e6f7f0; }
  .opt-circle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
    margin-top: 1px;
  }
  .opt-btn.sel .opt-circle {
    background: #1d9e75;
    border-color: #1d9e75;
    color: #fff;
  }
  .opt-label { font-size: 14px; font-weight: 600; color: #222; line-height: 1.5; }
  .opt-sub { font-size: 12px; color: #888; margin-top: 3px; }
  .next-btn {
    width: 100%;
    padding: 15px;
    background: #1d9e75;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.75rem;
    opacity: 0.35;
    pointer-events: none;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .next-btn.on { opacity: 1; pointer-events: auto; }
  .next-btn.on:hover { background: #0f6e56; }

  /* result */
  .score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .score-box { background: #f5f5f5; border-radius: 12px; padding: 14px 16px; }
  .score-box-name { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
  .score-num { font-size: 24px; font-weight: 700; }
  .score-bar-wrap { background: #ddd; border-radius: 99px; height: 5px; margin-top: 6px; overflow: hidden; }
  .score-bar { height: 5px; border-radius: 99px; }
  .result-box {
    background: #fafafa;
    border: 1.5px solid #e4e4e4;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .result-tag {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 99px;
    display: inline-block;
    margin-bottom: 0.9rem;
    letter-spacing: 0.02em;
  }
  .tag-wegovy { background: #ddeeff; color: #1a4f8a; }
  .tag-mounjaro { background: #fde8df; color: #8a3010; }
  .tag-both { background: #e6f4ee; color: #1d6040; }
  .result-name { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 0.6rem; line-height: 1.4; }
  .result-why { font-size: 14px; color: #555; line-height: 1.75; margin-bottom: 1.1rem; }
  .reason-list { list-style: none; }
  .reason-list li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: #333;
    padding: 8px 0;
    border-bottom: 1px solid #ebebeb;
    line-height: 1.5;
  }
  .reason-list li:last-child { border-bottom: none; }
  .check { color: #1d9e75; font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .cta-box {
    background: linear-gradient(135deg, #e6f7f0 0%, #d0f0e4 100%);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 1rem;
  }
  .cta-title { font-size: 15px; font-weight: 700; color: #0f5c3c; margin-bottom: 0.4rem; }
  .cta-desc { font-size: 13px; color: #1d7a54; line-height: 1.6; margin-bottom: 1rem; }
  .cta-btn {
    display: inline-block;
    background: #1d9e75;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 13px 30px;
    border-radius: 12px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .cta-btn:hover { background: #0f6e56; }
  .restart-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1.5px solid #ddd;
    border-radius: 14px;
    font-size: 14px;
    color: #888;
    cursor: pointer;
    margin-top: 0.5rem;
    font-weight: 500;
  }
  .restart-btn:hover { background: #f5f5f5; }
  .disclaimer {
    font-size: 11px;
    color: #bbb;
    text-align: center;
    margin-top: 1.25rem;
    line-height: 1.7;
  }
  .made-by {
    font-size: 11px;
    color: #ccc;
    text-align: center;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
<div class="card" id="app"></div>

<script>
const questions = [
  {
    text: '혈당 관련 문제가 있으신가요?',
    desc: '당뇨병 또는 공복혈당 이상 여부',
    options: [
      { label: '2형 당뇨병 진단을 받았어요', sub: '인슐린 또는 경구약 복용 중', value: 'mounjaro', w: 3 },
      { label: '공복혈당이 높거나 전당뇨 단계예요', sub: '아직 당뇨 진단은 아님', value: 'mounjaro', w: 2 },
      { label: '혈당은 정상이에요', sub: '당뇨 관련 이슈 없음', value: 'wegovy', w: 1 },
    ]
  },
  {
    text: '현재 체중 목표는 어느 정도인가요?',
    desc: '감량이 필요한 체중 범위',
    options: [
      { label: '20kg 이상 감량이 필요해요', sub: '고도비만, 적극적 감량 목표', value: 'mounjaro', w: 2 },
      { label: '10~20kg 감량 목표예요', sub: '중등도 비만', value: 'both', w: 1 },
      { label: '10kg 미만, 관리 수준이에요', sub: '과체중 또는 경도 비만', value: 'wegovy', w: 1 },
    ]
  },
  {
    text: '식습관 패턴을 골라주세요',
    desc: '가장 가까운 것을 선택',
    options: [
      { label: '단 음식, 탄수화물을 자주 많이 먹어요', sub: '인슐린 저항성 관련 패턴', value: 'mounjaro', w: 2 },
      { label: '폭식하거나 배고픔을 참기 어려워요', sub: '식욕 조절이 주된 문제', value: 'wegovy', w: 2 },
      { label: '잘 먹지 않아도 살이 쪄요', sub: '기초대사 또는 호르몬 문제 의심', value: 'mounjaro', w: 1 },
    ]
  },
  {
    text: '동반 질환이나 건강 이슈가 있나요?',
    desc: '해당하는 것을 선택하세요',
    options: [
      { label: '고지혈증·지방간·인슐린 저항성 있어요', sub: '대사 이상 복합형', value: 'mounjaro', w: 3 },
      { label: '수면무호흡·관절 통증이 있어요', sub: '체중으로 인한 이차 질환', value: 'wegovy', w: 2 },
      { label: '특별한 동반 질환은 없어요', sub: '단순 체중 관리 목적', value: 'wegovy', w: 1 },
    ]
  },
  {
    text: '이전에 다이어트 약이나 주사를 써본 적이 있나요?',
    desc: '경험 여부',
    options: [
      { label: '삭센다(리라글루타이드)를 써봤어요', sub: 'GLP-1 계열 경험 있음', value: 'mounjaro', w: 2 },
      { label: '다른 약은 써봤지만 GLP-1은 처음이에요', sub: '향정·한약·다이어트 약 등', value: 'both', w: 1 },
      { label: '처음 시도예요', sub: '약물 치료 경험 없음', value: 'wegovy', w: 1 },
    ]
  }
];

const results = {
  wegovy: {
    tag: '위고비 해당 가능성 높음', tagClass: 'tag-wegovy',
    name: '위고비에 더 해당되는 상태예요',
    why: '체크하신 항목을 보면 혈당보다 식욕 조절과 체중 감량이 주된 목표인 경우로, 위고비(세마글루타이드)에 해당하는 패턴이에요. 단, 정확한 처방은 반드시 전문의와 상담이 필요해요.',
    reasons: [
      '식욕 억제 효과가 뛰어나 초기 적응이 수월해요',
      '심혈관 질환 예방 효과가 임상으로 입증되어 있어요',
      '수면무호흡·관절 부담 개선에 직접적 도움이 돼요',
      '혈당이 정상인 분도 안전하게 사용 가능해요',
    ]
  },
  mounjaro: {
    tag: '마운자로 해당 가능성 높음', tagClass: 'tag-mounjaro',
    name: '마운자로에 더 해당되는 상태예요',
    why: '체크하신 항목을 보면 혈당 이상, 대사 이상, 또는 이전 GLP-1 약물 경험이 있는 경우로, 마운자로(티르제파타이드)에 해당하는 패턴이에요. 단, 정확한 처방은 반드시 전문의와 상담이 필요해요.',
    reasons: [
      'GIP+GLP-1 이중 작용으로 혈당·체중을 동시에 조절해요',
      '삭센다 효과가 부족했던 분께 더 강한 감량 효과가 있어요',
      '지방간·인슐린 저항성 개선에 탁월해요',
      '2형 당뇨 동반 시 1차 선택으로 추천돼요',
    ]
  },
  both: {
    tag: '두 약 모두 해당 가능', tagClass: 'tag-both',
    name: '두 가지 모두 해당될 수 있어요',
    why: '체크하신 항목 기준으로 위고비와 마운자로 모두 해당될 수 있는 상태예요. 현재 혈당 수치와 체중 감량 목표에 따라 달라질 수 있으니 전문의 상담을 권장드려요.',
    reasons: [
      '혈당이 경계선이라면 마운자로가 더 유리해요',
      '순수 체중 관리 목적이라면 위고비도 충분해요',
      '보험 적용 여부와 비용도 함께 고려하세요',
      '전문의 상담으로 최종 결정을 권장드려요',
    ]
  }
};

let cur = 0, answers = [], scores = { wegovy: 0, mounjaro: 0, both: 0 };

function getResult() {
  if (scores.mounjaro >= 6) return 'mounjaro';
  if (scores.wegovy >= 5) return 'wegovy';
  if (scores.mounjaro > scores.wegovy) return 'mounjaro';
  if (scores.wegovy > scores.mounjaro) return 'wegovy';
  return 'both';
}

function render() {
  const q = questions[cur];
  const sel = answers[cur];
  const pct = Math.round((cur / questions.length) * 100);
  document.getElementById('app').innerHTML = `
    <div class="badge">📋 체크리스트 기반 분석</div>
    <p class="quiz-title">위고비 vs 마운자로<br>나의 상태로 알아보기</p>
    <p class="quiz-sub">5가지 항목을 체크하면 내 상태에 따라<br>어떤 약이 더 해당되는지 분석해드려요.</p>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <p class="step-label">질문 ${cur + 1} / ${questions.length}</p>
    <p class="q-text">${q.text}</p>
    <p class="q-desc">${q.desc}</p>
    ${q.options.map((o, i) => `
      <button class="opt-btn${sel===i?' sel':''}" onclick="pick(${i})">
        <div class="opt-circle">${sel===i?'✓':String.fromCharCode(65+i)}</div>
        <div>
          <div class="opt-label">${o.label}</div>
          <div class="opt-sub">${o.sub}</div>
        </div>
      </button>
    `).join('')}
    <button class="next-btn${sel!==undefined?' on':''}" onclick="next()">
      ${cur < questions.length - 1 ? '다음 질문 →' : '결과 확인하기 →'}
    </button>
  `;
}

function pick(i) {
  const q = questions[cur];
  if (answers[cur] !== undefined) scores[q.options[answers[cur]].value] -= q.options[answers[cur]].w;
  answers[cur] = i;
  scores[q.options[i].value] += q.options[i].w;
  render();
}

function next() {
  if (answers[cur] === undefined) return;
  cur++;
  if (cur >= questions.length) showResult();
  else render();
}

function showResult() {
  const key = getResult();
  const r = results[key];
  const total = scores.wegovy + scores.mounjaro + scores.both;
  const wP = Math.min(100, Math.round(scores.wegovy / Math.max(total,1) * 100));
  const mP = Math.min(100, Math.round(scores.mounjaro / Math.max(total,1) * 100));
  document.getElementById('app').innerHTML = `
    <div class="badge">✅ 분석 완료</div>
    <p class="quiz-title" style="margin-bottom:1.25rem;">체크리스트 결과가 나왔어요</p>
    <div class="score-row">
      <div class="score-box">
        <div class="score-box-name">위고비 점수</div>
        <div class="score-num" style="color:#1a4f8a;">${scores.wegovy}<span style="font-size:14px;color:#aaa;">점</span></div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${wP}%;background:#3388dd;"></div></div>
      </div>
      <div class="score-box">
        <div class="score-box-name">마운자로 점수</div>
        <div class="score-num" style="color:#8a3010;">${scores.mounjaro}<span style="font-size:14px;color:#aaa;">점</span></div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${mP}%;background:#d85a30;"></div></div>
      </div>
    </div>
    <div class="result-box">
      <span class="result-tag ${r.tagClass}">${r.tag}</span>
      <p class="result-name">${r.name}</p>
      <p class="result-why">${r.why}</p>
      <ul class="reason-list">
        ${r.reasons.map(re=>`<li><span class="check">✓</span><span>${re}</span></li>`).join('')}
      </ul>
    </div>
    <div class="cta-box">
      <p class="cta-title">더 자세히 알고 싶으신가요?</p>
      <p class="cta-desc">이 결과는 체크리스트 기반 참고용이에요.<br>혈액검사 결과와 복용 약물에 따라 달라질 수 있어요.</p>
      <a class="cta-btn" href="#">더 알아보기 →</a>
    </div>
    <p class="disclaimer">* 이 체크리스트는 의료 처방을 대체하지 않습니다.<br>결과는 참고용이며, 반드시 전문의와 상담 후 처방받으세요.</p>
    <button class="restart-btn" onclick="restart()">↺ 다시 해보기</button>
  `;
}

function restart() {
  cur = 0; answers = []; scores = { wegovy: 0, mounjaro: 0, both: 0 };
  render();
}

render();
</script>
</body>
</html>
